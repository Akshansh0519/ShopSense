name: Keep Render Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/14 * * * *'
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch: 

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        # We use || exit 0 so that if Render is temporarily down for maintenance, 
        # it doesn't spam your email with GitHub Action failure alerts.
        run: curl -sSf https://shopsense-pkys.onrender.com/health || exit 0
