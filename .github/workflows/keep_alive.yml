name: Keep Render Alive

on:
  schedule:
    # Runs every 10 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/10 * * * *'
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch: 

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        # Temporarily removing || exit 0 and adding -v for verbose logging
        # so we can see the exact response from Render in the GitHub logs.
        run: curl -v https://shopsense-pkys.onrender.com/health
